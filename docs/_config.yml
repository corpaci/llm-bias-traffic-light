title: LLM Bias Traffic Light
description: A local, real-time browser extension for auditing social bias in live LLM outputs.
theme: jekyll-theme-cayman

# Apply the custom paper layout to every page (pages omit `layout:` in their front matter).
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# --- Hosting path -------------------------------------------------------
# CURRENT: GitHub Pages under the aaam-research org.
#   Live at: https://aaam-research.github.io/llm-bias-traffic-light/
url: "https://aaam-research.github.io"
baseurl: "/llm-bias-traffic-light"
